<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RateHistoryChart — mockup</title>
  <style>
    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --text: #e4e4e4;
      --muted: #888;
      --border: #333;
      --accent: #6ea8fe;
      --phone-w: 390px;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }
    h1 { font-size: 1.125rem; margin: 0 0 6px; }
    .intro { color: var(--muted); font-size: 0.8125rem; margin-bottom: 16px; max-width: 28rem; }
    .phone {
      max-width: var(--phone-w);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      background: var(--surface);
    }
    .phone-bar {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }
    .phone-content { padding: 14px; }
    .feed-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .feed-stat {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px 12px;
    }
    .feed-stat__value { margin: 0; font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .feed-stat__label {
      margin: 2px 0 0;
      font-size: 0.6875rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .rate-history-chart {
      position: relative;
      padding: 4px 0;
      margin-bottom: 12px;
      touch-action: none;
      user-select: none;
    }
    .rate-history-chart svg {
      display: block;
      width: 100%;
      height: 48px;
    }
    .rate-bar--max { fill: var(--accent); }
    .rate-bar--avg { fill: color-mix(in srgb, var(--muted) 55%, transparent); }
    .rate-history-tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 6px);
      transform: translateX(-50%);
      pointer-events: none;
      background: #2a2a2a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 2;
    }
    .rate-history-tooltip.visible { opacity: 1; }
    .rate-history-tooltip .title {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .rate-history-tooltip .trend-up { color: #4ade80; }
    .rate-history-tooltip .trend-down { color: #f87171; }
    .rate-history-tooltip .muted { color: var(--muted); }
    .feed-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .feed-tab {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .feed-tab--active { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>
  <h1>RateHistoryChart — mockup</h1>
  <p class="intro">Один столбик на день: avg (низ) + max−avg (верх). Наведите или проведите пальцем.</p>

  <div class="phone">
    <div class="phone-bar">390px · под FeedStats</div>
    <div class="phone-content">
      <div class="feed-stats">
        <div class="feed-stat"><p class="feed-stat__value">7</p><p class="feed-stat__label">Займов</p></div>
        <div class="feed-stat"><p class="feed-stat__value">26%</p><p class="feed-stat__label">Лучшая ставка</p></div>
        <div class="feed-stat"><p class="feed-stat__value">4</p><p class="feed-stat__label">Платформ</p></div>
      </div>

      <div class="rate-history-chart" id="chart">
        <div class="rate-history-tooltip" id="tooltip" aria-hidden="true">
          <div class="title">Ставка</div>
          <div class="date" id="tt-date">08.06.2026</div>
          <div id="tt-max">макс 26%</div>
          <div id="tt-avg">ср. 19.5% <span class="trend-up">↑</span></div>
        </div>
        <svg id="svg" viewBox="0 0 330 48" preserveAspectRatio="none"></svg>
      </div>

      <div class="feed-tabs">
        <div class="feed-tab feed-tab--active">Активные</div>
        <div class="feed-tab">Закрытые</div>
      </div>
    </div>
  </div>

  <script>
    const DAYS = 45;
    const points = [];
    let avg = 17.5;
    for (let i = 0; i < DAYS; i++) {
      avg += (Math.random() - 0.48) * 0.8;
      avg = Math.max(14, Math.min(22, avg));
      const max = avg + 4 + Math.random() * 3;
      const d = new Date();
      d.setDate(d.getDate() - (DAYS - 1 - i));
      points.push({
        date: d.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" }).replace(/\//g, "."),
        max_rate: Math.round(max * 10) / 10,
        avg_rate: Math.round(avg * 10) / 10,
      });
    }

    const svg = document.getElementById("svg");
    const chart = document.getElementById("chart");
    const tooltip = document.getElementById("tooltip");
    const ttDate = document.getElementById("tt-date");
    const ttMax = document.getElementById("tt-max");
    const ttAvg = document.getElementById("tt-avg");

    const W = 330;
    const H = 48;
    const yMax = Math.max(...points.map((p) => p.max_rate));

    function formatRate(n) {
      return Number.isInteger(n) ? `${n}%` : `${n}%`;
    }

    function avgTrend(i) {
      if (i === 0) return null;
      const prev = points[i - 1].avg_rate;
      const cur = points[i].avg_rate;
      if (cur > prev) return "up";
      if (cur < prev) return "down";
      return null;
    }

    function setAvgLine(p, i) {
      const trend = avgTrend(i);
      ttAvg.textContent = "";
      ttAvg.append("ср. " + formatRate(p.avg_rate));
      if (trend === "up") {
        const span = document.createElement("span");
        span.className = "trend-up";
        span.textContent = " ↑";
        ttAvg.appendChild(span);
      } else if (trend === "down") {
        const span = document.createElement("span");
        span.className = "trend-down";
        span.textContent = " ↓";
        ttAvg.appendChild(span);
      }
    }

    const barW = W / DAYS;

    points.forEach((p, i) => {
      const maxH = (p.max_rate / yMax) * (H - 2);
      const avgH = (p.avg_rate / yMax) * (H - 2);
      const spreadH = maxH - avgH;
      const x = i * barW;
      const w = Math.max(0.5, barW - 0.3);
      const avgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      avgRect.setAttribute("class", "rate-bar--avg");
      avgRect.setAttribute("x", x);
      avgRect.setAttribute("y", H - avgH);
      avgRect.setAttribute("width", w);
      avgRect.setAttribute("height", avgH);
      svg.appendChild(avgRect);
      const maxRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      maxRect.setAttribute("class", "rate-bar--max");
      maxRect.setAttribute("x", x);
      maxRect.setAttribute("y", H - maxH);
      maxRect.setAttribute("width", w);
      maxRect.setAttribute("height", spreadH);
      svg.appendChild(maxRect);
    });

    function showAt(clientX) {
      const rect = chart.getBoundingClientRect();
      const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
      const i = Math.min(DAYS - 1, Math.max(0, Math.floor((x / rect.width) * DAYS)));
      const p = points[i];
      ttDate.textContent = p.date;
      ttMax.textContent = `макс ${formatRate(p.max_rate)}`;
      setAvgLine(p, i);
      tooltip.classList.add("visible");
      tooltip.style.left = `${((i + 0.5) / DAYS) * 100}%`;
    }

    function hide() {
      tooltip.classList.remove("visible");
    }

    chart.addEventListener("mousemove", (e) => showAt(e.clientX));
    chart.addEventListener("mouseleave", hide);
    chart.addEventListener("touchstart", (e) => { e.preventDefault(); showAt(e.touches[0].clientX); });
    chart.addEventListener("touchmove", (e) => { e.preventDefault(); showAt(e.touches[0].clientX); });
    chart.addEventListener("touchend", hide);
  </script>
</body>
</html>
